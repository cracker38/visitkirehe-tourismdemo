name: Deploy VisitKirehe

on:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-visitkirehe
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"

      - name: Install root deps
        run: npm ci

      - name: Install and build client
        run: |
          cd client
          npm ci
          npm run build

      # Copy built frontend into server (same-origin: no CORS)
      - name: Prepare combined app
        run: |
          rm -rf server/public
          cp -r client/dist server/public

      # Deploy frontend to main domain (proxy /api via .htaccess)
      - name: Upload frontend to main domain
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          source: "client/dist/"
          target: "/home/${{ secrets.CPANEL_USER }}/public_html/visitkirehe.cypadi.com/"
          strip_components: 2

      - name: Upload combined app to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          source: "server/*,!server/.env,!server/uploads/*,!server/node_modules/*"
          target: "/home/${{ secrets.CPANEL_USER }}/visitkirehe/"
          strip_components: 0

      # Install backend deps in cPanel nodevenv and restart app
      - name: Restart backend app
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,DB_NAME
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          script: |
            set -e

            APP_ROOT="/home/${{ secrets.CPANEL_USER }}/visitkirehe/server"
            VENV_ACTIVATE="/home/${{ secrets.CPANEL_USER }}/nodevenv/visitkirehe/server/20/bin/activate"

            cd "$APP_ROOT"

            # Create .env only if missing (prevents credentials changing unnoticed).
            # If .env already exists, we leave it untouched.
            if [ ! -f .env ]; then
              if [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ] && [ -n "$DB_NAME" ]; then
                {
                  printf 'DB_HOST=%s\n' "${DB_HOST:-localhost}"
                  printf 'DB_USER=%s\n' "$DB_USER"
                  printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
                  printf 'DB_NAME=%s\n' "$DB_NAME"
                  printf 'NODE_ENV=production\n'
                  printf 'UPLOADS_DIR=%s\n' "$APP_ROOT/uploads"
                } > .env
                echo "Created .env from secrets"
              else
                echo "DB secrets missing (DB_USER/DB_PASSWORD/DB_NAME) and .env does not exist."
                exit 1
              fi
            else
              echo ".env already exists; leaving it unchanged."
            fi

            # Activate cPanel Node app environment so npm/node are available.
            if [ -f "$VENV_ACTIVATE" ]; then
              source "$VENV_ACTIVATE"
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm not found after activating nodevenv."
              exit 1
            fi

            # Only install dependencies if node_modules is missing.
            # This reduces restart time and avoids occasional Passenger instability.
            if [ ! -d node_modules ]; then
              npm ci || npm install
            else
              echo "node_modules already present; skipping npm install."
            fi

            # Restart Node app (Passenger)
            mkdir -p tmp
            touch tmp/restart.txt

            # Wait briefly and verify API is up
            sleep 5
            if command -v curl >/dev/null 2>&1; then
              PORT_TO_CHECK="$(grep '^PORT=' .env | cut -d= -f2 || true)"
              PORT_TO_CHECK="${PORT_TO_CHECK:-5000}"
              curl -fsS "http://127.0.0.1:${PORT_TO_CHECK}/api/health/db" >/dev/null || {
                echo "Health check failed after restart."
                exit 1
              }
            else
              echo "curl not found; skipping health check."
            fi