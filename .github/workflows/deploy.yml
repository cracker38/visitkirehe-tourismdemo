name: Deploy VisitKirehe

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"

      - name: Install root deps
        run: npm ci

      - name: Install and build client
        run: |
          cd client
          npm ci
          npm run build

      # Upload built frontend (client/dist) to subdomain document root
      - name: Upload client dist to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          source: "client/dist/*"
          target: "/home/${{ secrets.CPANEL_USER }}/public_html/visitkirehe.cypadi.com/"
          strip_components: 2

      # Upload backend source (exclude uploads and node_modules)
      - name: Upload server source to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          source: "server/*,!server/uploads/*,!server/node_modules/*"
          target: "/home/${{ secrets.CPANEL_USER }}/visitkirehe/"
          strip_components: 0

      # Install backend deps in cPanel nodevenv and restart app
      - name: Restart backend app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          script: |
            set -e

            APP_ROOT="/home/${{ secrets.CPANEL_USER }}/visitkirehe/server"
            VENV_ACTIVATE="/home/${{ secrets.CPANEL_USER }}/nodevenv/visitkirehe/server/bin/activate"

            cd "$APP_ROOT"

            # Activate cPanel Node app environment so npm/node are available.
            if [ -f "$VENV_ACTIVATE" ]; then
              source "$VENV_ACTIVATE"
            fi

            if command -v npm >/dev/null 2>&1; then
              npm ci || npm install
            else
              echo "npm not found in SSH session; skipping install."
            fi

            # Restart Node app (Passenger)
            mkdir -p tmp
            touch tmp/restart.txt