name: Deploy VisitKirehe

on:
  push:
    branches: [ "main" ]  # change if your main branch has a different name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"

      - name: Install root deps
        run: npm ci

      - name: Install and build client
        run: |
          cd client
          npm ci
          npm run build

      # Upload built frontend (client/dist) to subdomain document root
      - name: Upload client dist to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}      # app.sharedlord.com
          username: ${{ secrets.CPANEL_USER }}  # cypadico930
          key: ${{ secrets.CPANEL_SSH_KEY }}    # private key content
          port: ${{ secrets.CPANEL_PORT }}      # usually 22
          source: "client/dist/*"
          target: "/home/${{ secrets.CPANEL_USER }}/public_html/visitkirehe.cypadi.com/"
          strip_components: 2

      # Sync backend code to server and restart Node app
      - name: Deploy backend and restart Node app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          script: |
            set -e
            PROJECT_DIR="/home/${{ secrets.CPANEL_USER }}/visitkirehe"
            REPO_URL="https://github.com/cracker38/visitkirehe-tourismdemo.git"

            # Ensure project directory exists and is a git repo.
            if [ -d "$PROJECT_DIR/.git" ]; then
              cd "$PROJECT_DIR"
              git fetch origin
              git reset --hard origin/main
            elif [ -d "$PROJECT_DIR" ] && [ "$(ls -A "$PROJECT_DIR")" ]; then
              cd "$PROJECT_DIR"
              git init
              git remote remove origin 2>/dev/null || true
              git remote add origin "$REPO_URL"
              git fetch origin
              git checkout -B main origin/main
            else
              rm -rf "$PROJECT_DIR"
              git clone "$REPO_URL" "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            fi

            # Install backend deps
            cd "$PROJECT_DIR/server"
            npm ci || npm install

            # Restart Node app via Passenger (common cPanel method)
            mkdir -p tmp
            touch tmp/restart.txt