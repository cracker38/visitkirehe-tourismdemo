name: Deploy VisitKirehe

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"

      - name: Install root deps
        run: npm ci

      - name: Install and build client
        run: |
          cd client
          npm ci
          npm run build

      # Copy built frontend into server (same-origin: no CORS)
      - name: Prepare combined app
        run: |
          rm -rf server/public
          cp -r client/dist server/public

      # Deploy frontend to main domain (proxy /api via .htaccess)
      - name: Upload frontend to main domain
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          source: "client/dist/"
          target: "/home/${{ secrets.CPANEL_USER }}/public_html/visitkirehe.cypadi.com/"
          strip_components: 2

      - name: Upload combined app to cPanel
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          # Exclude uploads and node_modules (keep existing server runtime + user uploaded images).
          # Also exclude server/.env so we never overwrite it with a possibly wrong committed value.
          source: "server/*,!server/uploads/*,!server/node_modules/*,!server/.env"
          target: "/home/${{ secrets.CPANEL_USER }}/visitkirehe/"
          strip_components: 0

      # Install backend deps in cPanel nodevenv and restart app
      - name: Restart backend app
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,DB_NAME
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          script: |
            set -e

            APP_ROOT="/home/${{ secrets.CPANEL_USER }}/visitkirehe/server"
            # IMPORTANT: On your server, nodevenv path is:
            #   /home/${CPANEL_USER}/nodevenv/visitkirehe/server/bin/activate
            # (there is no /20 segment)
            VENV_ACTIVATE="/home/${{ secrets.CPANEL_USER }}/nodevenv/visitkirehe/server/bin/activate"
            VENV_BASE="/home/${{ secrets.CPANEL_USER }}/nodevenv/visitkirehe/server"
            # Note: some cPanel setups place npm under .../server/20/bin/npm.
            NPM_BIN_DEFAULT="$VENV_BASE/bin/npm"
            NPM_BIN_V20="$VENV_BASE/20/bin/npm"

            cd "$APP_ROOT"

            # Always write a correct .env on the server so a bad committed .env
            # (or missing UPLOADS_DIR) can never break Passenger startup.
            {
              printf 'DB_HOST=%s\n' "${DB_HOST:-localhost}"
              printf 'DB_USER=%s\n' "${DB_USER:-}"
              printf 'DB_PASSWORD=%s\n' "${DB_PASSWORD:-}"
              printf 'DB_NAME=%s\n' "${DB_NAME:-}"
              printf 'NODE_ENV=production\n'
              printf 'UPLOADS_DIR=%s\n' "/home/${{ secrets.CPANEL_USER }}/visitkirehe/server/uploads"
            } > .env
            echo "Updated .env on server from secrets"

            # Activate cPanel Node app environment so npm/node are available.
            if [ -f "$VENV_ACTIVATE" ]; then
              # shellcheck disable=SC1090
              source "$VENV_ACTIVATE"
            fi

            # Prefer running npm after activation (PATH should be correct).
            if command -v npm >/dev/null 2>&1; then
              npm ci || npm install
            elif [ -x "$NPM_BIN_DEFAULT" ]; then
              "$NPM_BIN_DEFAULT" ci || "$NPM_BIN_DEFAULT" install
            elif [ -x "$NPM_BIN_V20" ]; then
              "$NPM_BIN_V20" ci || "$NPM_BIN_V20" install
            else
              echo "ERROR: npm not found."
              echo "Checked:"
              echo "- $NPM_BIN_DEFAULT"
              echo "- $NPM_BIN_V20"
              ls -la "$VENV_BASE" || true
              exit 1
            fi

            # Restart Node app (Passenger)
            mkdir -p tmp
            touch tmp/restart.txt